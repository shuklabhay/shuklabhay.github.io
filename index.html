<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          if (/\.pdf($|\?)/i.test(decoded)) {
            l.replace(decoded);
            return;
          }
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);

      (function (l) {
        if (l.pathname === "/") {
          var criticalHomeStyle = document.createElement("style");
          criticalHomeStyle.id = "route-home-critical-style";
          criticalHomeStyle.textContent =
            ".route-home {" +
            "  background-color: #5a6c99;" +
            "  background-repeat: no-repeat;" +
            "  background-size: cover;" +
            "  background-position: center;" +
            '  background-image: url("/static/landing-1280.webp");' +
            "}";
          document.head.appendChild(criticalHomeStyle);
          document.documentElement.classList.add("route-home");
        }
      })(window.location);
    </script>
