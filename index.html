<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          if (/\.pdf($|\?)/i.test(decoded)) {
            l.replace(decoded);
            return;
          }
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);

      (function (l) {
        if (l.pathname === "/") {
          var criticalHomeStyle = document.createElement("style");
          criticalHomeStyle.id = "route-home-critical-style";
          criticalHomeStyle.textContent =
            ".route-home {" +
            "  background-color: #5a6c99;" +
            "  background-repeat: no-repeat;" +
            "  background-size: cover;" +
            "  background-position: center;" +
            '  background-image: url("/static/landing-1280.webp");' +
            "}";
          document.head.appendChild(criticalHomeStyle);
          document.documentElement.classList.add("route-home");
        }
      })(window.location);
    </script>
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link
      rel="preload"
      href="/static/landing-1280.webp"
      as="image"
      type="image/webp"
      fetchpriority="high"
    />
    <link
      rel="preload"
      href="/static/landing-1920.webp"
      as="image"
      type="image/webp"
    />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Abhay Shukla</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      (async function () {
        const normalizedPathname =
          window.location.pathname.replace(/\/+$/, "") || "/";

        if (normalizedPathname === "/resume") {
          const fallbackPath = "/about";

          try {
            const response = await fetch("/static/sitedata/contact.json");
            const contactData = await response.json();
            const resumeLink = Array.isArray(contactData)
              ? contactData.find((entry) => entry?.title === "Resume")?.link
              : undefined;

            window.location.replace(
              typeof resumeLink === "string" && resumeLink
                ? resumeLink
                : fallbackPath,
            );
            return;
          } catch (error) {
            console.error("Failed to redirect to resume:", error);
            window.location.replace(fallbackPath);
            return;
          }
        }

        await import("./src/Main.tsx");
      })();
    </script>
  </body>
</html>
