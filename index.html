<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          if (/\.pdf($|\?)/i.test(decoded)) {
            l.replace(decoded);
            return;
          }
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash,
          );
        }
      })(window.location);

      (function (l) {
        if (l.pathname === "/") {
          document.documentElement.classList.add("route-home");
        }
      })(window.location);
    </script>
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link
      rel="preload"
      href="/static/landing-1280.avif"
      as="image"
      fetchpriority="high"
    />
    <link rel="preload" href="/static/landing-1920.avif" as="image" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Abhay Shukla</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/Main.tsx"></script>
  </body>
</html>
